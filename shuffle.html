<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抽牌 · 知时塔罗</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/shuffle.css">
</head>
<body>
<canvas id="mxhCanvas"></canvas>

<div class="shuffle-app">
  <!-- 头部 -->
  <div class="sh-top">
    <a href="index.html" class="sh-back">← 返回选择</a>
    <h1 class="sh-title">知 时 塔 罗</h1>
  </div>

  <!-- 用户问题 -->
  <div class="sh-question" id="questionBanner">
    <span class="sh-q-label">你问的是</span>
    <span class="sh-q-text" id="questionDisplay"></span>
  </div>

  <!-- ===== 上方：已选牌位 ===== -->
  <div class="selected-row" id="selectedRow">
    <div class="selected-slots" id="selectedSlots">
      <!-- JS动态生成牌位槽 -->
    </div>
    <p class="selected-hint" id="selectedHint">点击下方弧牌选择 <span id="slotCount">3</span> 张</p>
  </div>

  <!-- ===== 下方：弧形牌扇 ===== -->
  <div class="arc-stage" id="arcStage">
    <!-- 洗牌动画牌堆 -->
    <div class="shuffle-deck" id="shuffleDeck">
      <div class="shuffle-deck-card" style="--sd:0;"></div>
      <div class="shuffle-deck-card" style="--sd:1;"></div>
      <div class="shuffle-deck-card" style="--sd:2;"></div>
      <div class="shuffle-deck-card" style="--sd:3;"></div>
      <div class="shuffle-deck-card" style="--sd:4;"></div>
      <div class="shuffle-deck-card" style="--sd:5;"></div>
      <div class="shuffle-deck-card" style="--sd:6;"></div>
      <div class="shuffle-deck-card" style="--sd:7;"></div>
    </div>
    <div class="shuffle-label" id="shuffleLabel">正在洗牌...</div>
    <div class="arc-container" id="arcContainer">
      <!-- JS动态生成弧形排列的卡牌 -->
    </div>
    <button class="arc-nav arc-nav-left" id="arcNavLeft">◂</button>
    <button class="arc-nav arc-nav-right" id="arcNavRight">▸</button>
  </div>

  <!-- ===== 底部按钮 ===== -->
  <div class="sh-confirm" id="confirmArea">
    <button class="btn-primary" id="flipBtn" disabled>选 满 牌 位 · 统 一 翻 牌 ▸</button>
    <button class="btn-primary" id="aiBtn" style="display:none;">查 看 AI 解 读 ▸</button>
  </div>
</div>

<!-- 预加载 -->
<img src="assets/cards/back.svg" style="display:none;">

<script src="js/mo-xing-he.js"></script>
<script src="js/tarot-data.js"></script>
<script>
MoXingHe.start('mxhCanvas', false);

// ===== 参数 =====
var params = new URLSearchParams(window.location.search);
var spreadId = params.get('spread') || 'timeFlow';
var question = params.get('question') || '';
if (!question) question = '我的人生近期有什么需要注意的？';
var spread = getSpreadById(spreadId);
var requiredCount = spread.cardCount;

document.getElementById('questionDisplay').textContent = question.length > 42 ? question.slice(0,42) + '...' : question;
document.getElementById('slotCount').textContent = requiredCount;

// ===== 全局状态 =====
var deckCards = TAROT_CARDS.slice();
var shuffledIndices = [];
var arcCardWidth = window.innerWidth <= 380 ? 40 : window.innerWidth <= 480 ? 44 : 50;
var scrollPx = 0;                    // 像素级滚动位置
var maxScrollPx = 0;                 // 最大滚动范围
var selectedCards = [];
var flipped = false;  // 是否已统一翻牌
var isTouchDevice = 'ontouchstart' in window;
if (isTouchDevice) {
  document.getElementById('arcNavLeft').style.display = 'none';
  document.getElementById('arcNavRight').style.display = 'none';
}

// ===== 初始化 =====
function init() {
  // Fisher-Yates 洗牌
  shuffledIndices = deckCards.map(function(_, i) { return i; });
  for (var i = shuffledIndices.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = shuffledIndices[i]; shuffledIndices[i] = shuffledIndices[j]; shuffledIndices[j] = tmp;
  }
  renderSlots();

  // 播放洗牌动画 → 展开弧牌
  playShuffleIntro();
}

function playShuffleIntro() {
  var deck = document.getElementById('shuffleDeck');
  var label = document.getElementById('shuffleLabel');
  var container = document.getElementById('arcContainer');
  container.style.opacity = '0';

  // 2.5秒洗牌动画后展开
  setTimeout(function() {
    deck.classList.add('done');
    label.classList.add('done');

    // 渲染弧牌（带飞入动画）
    renderArcWithFlyIn();

    // 动画总时长 = 最后一张牌延迟 + 动画时长 + buffer
    var totalCards = shuffledIndices.length;
    var animDuration = totalCards * 0.015 * 1000 + 700;

    setTimeout(function() {
      deck.style.display = 'none';
      label.style.display = 'none';
      container.style.opacity = '1';
      // 清除飞入动画，恢复正常弧位
      var cards = container.querySelectorAll('.arc-card');
      cards.forEach(function(c) { c.classList.remove('fly-in'); c.style.opacity = ''; });
      updateArcPosition();
    }, animDuration);
  }, 2200);
}

// ===== 渲染已选牌位槽 =====
function renderSlots() {
  var container = document.getElementById('selectedSlots');
  container.innerHTML = '';
  for (var i = 0; i < requiredCount; i++) {
    var pos = spread.positions[i];
    var slot = document.createElement('div');
    slot.className = 'slot';
    slot.dataset.slotIndex = i;

    // 检查是否已有选中的牌
    var selected = selectedCards.find(function(s) { return s.slotIndex === i; });
    if (selected) {
      slot.classList.add('filled');
      if (flipped) {
        // 已翻牌：显示牌面+逆位
        slot.innerHTML =
          '<div class="slot-card-inner' + (selected.reversed ? ' rev' : '') + '">' +
            '<div class="slot-card-back"><img src="assets/cards/back.svg" alt="卡背"></div>' +
            '<div class="slot-card-front">' +
              '<img src="assets/cards/' + selected.cardObj.id + '.jpg" alt="' + selected.cardObj.name + '">' +
              '<span class="slot-front-name">' + selected.cardObj.name + '</span>' +
              '<span class="slot-front-rev">' + (selected.reversed ? '逆位' : '正位') + '</span>' +
            '</div>' +
          '</div>' +
          '<span class="slot-pos">' + pos.label + '</span>' +
          '<button class="slot-remove" data-slot="' + i + '">✕</button>';
      } else {
        // 未翻牌：只显示卡背
        slot.innerHTML =
          '<img class="slot-img-back" src="assets/cards/back.svg" alt="卡背">' +
          '<span class="slot-pos">' + pos.label + '</span>' +
          '<button class="slot-remove" data-slot="' + i + '">✕</button>';
      }
    } else {
      slot.innerHTML =
        '<div class="slot-empty">' +
          '<span class="slot-num">' + (i+1) + '</span>' +
          '<span class="slot-label">' + pos.label + '</span>' +
        '</div>';
    }
    container.appendChild(slot);
  }

  // 删除按钮事件
  container.querySelectorAll('.slot-remove').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var idx = parseInt(this.dataset.slot);
      removeCard(idx);
    });
  });

  document.getElementById('selectedHint').textContent = flipped
    ? '牌面已揭示'
    : (selectedCards.length >= requiredCount
      ? '已选满！点击下方翻牌'
      : '点击弧牌选牌（已选 ' + selectedCards.length + ' / ' + requiredCount + '）');

  if (!flipped) updateFlipBtn();
}

function removeCard(slotIndex) {
  if (flipped) return; // 翻牌后不可修改
  selectedCards = selectedCards.filter(function(s) { return s.slotIndex !== slotIndex; });
  renderSlots();
  renderArcMarks();
  updateFlipBtn();
}

// ===== 渲染弧形牌扇（像素级自由滚动） =====
function renderArc() { doRenderArc(false); }
function renderArcWithFlyIn() { doRenderArc(true); }

function doRenderArc(withFlyIn) {
  var container = document.getElementById('arcContainer');
  container.innerHTML = '';

  var total = shuffledIndices.length;

  // 循环滚动范围
  var loopWidth = total * arcCardWidth;
  maxScrollPx = loopWidth;

  // 渲染每张牌并在边界处重复前12张和后12张（消除首尾缝隙）
  var copies = [
    { deckStart: total - 12, deckEnd: total, offset: -loopWidth },  // 尾牌前置
    { deckStart: 0, deckEnd: total, offset: 0 },                      // 正常
    { deckStart: 0, deckEnd: 12, offset: loopWidth }                  // 首牌后置
  ];

  copies.forEach(function(copy) {
    for (var i = copy.deckStart; i < copy.deckEnd; i++) {
      var deckIdx = i % total;
      var cardIdx = shuffledIndices[deckIdx];
      var card = deckCards[cardIdx];

      var div = document.createElement('div');
      div.className = 'arc-card' + (withFlyIn ? ' fly-in' : '') + (copy.offset !== 0 ? ' arc-dup' : '');
      div.dataset.deckIdx = deckIdx;
      div.style.left = (i * arcCardWidth + copy.offset) + 'px';
      if (withFlyIn && copy.offset === 0) {
        div.style.setProperty('--fly-delay', (i * 0.015) + 's');
      }
      div.style.setProperty('--arc-angle', '0deg');
      div.style.setProperty('--arc-idx', i);

      var isSelected = selectedCards.some(function(s) { return s.cardObj.id === card.id; });
      if (isSelected) div.classList.add('picked');

      var img = document.createElement('img');
      img.className = 'arc-card-img';
      img.src = 'assets/cards/back.svg';
      img.alt = '塔罗牌';
      img.draggable = false;

      var numBadge = document.createElement('span');
      numBadge.className = 'arc-card-num';
      numBadge.textContent = deckIdx + 1;

      div.appendChild(img);
      div.appendChild(numBadge);

      div.addEventListener('click', function(e) {
        if (window.__touchHandled) { window.__touchHandled = false; return; }
        e.stopPropagation();
        selectFromArc(parseInt(this.dataset.deckIdx));
      });

      container.appendChild(div);
    }
  });

  updateArcPosition();
}

// 循环滚动包裹
function wrapScroll(px) {
  if (maxScrollPx <= 0) return 0;
  var w = ((px % maxScrollPx) + maxScrollPx) % maxScrollPx;
  return w;
}

function updateArcPosition() {
  scrollPx = wrapScroll(scrollPx);
  var container = document.getElementById('arcContainer');
  container.style.transform = 'translateX(' + (-scrollPx) + 'px)';
  repositionWrappedCards();
  updateCardAngles();
}

function repositionWrappedCards() {
  // 边界副本已在 renderArc 中预置，无需额外移动
  // 仅需确保角度更新覆盖所有副本
}

// 动态弧度：视口中心的牌角度=0°，两侧渐增至±35°
// 只更新视口范围内的牌（~25张），性能友好
function updateCardAngles() {
  var stageEl = document.getElementById('arcStage');
  var stageW = stageEl.offsetWidth;
  if (!stageW) return;
  var centerX = stageW / 2;
  var maxAngle = 35;
  var spreadZone = stageW * 0.7;

  var cards = document.querySelectorAll('.arc-card');
  for (var i = 0; i < cards.length; i++) {
    var el = cards[i];
    var deckIdx = parseInt(el.dataset.deckIdx);
    var cardLeft = parseFloat(el.style.left) || (deckIdx * arcCardWidth);
    var cardCenterX = cardLeft - scrollPx + (parseFloat(el.style.width) || 115) / 2;
    // 只更新屏幕附近±300px的牌
    if (cardCenterX < -300 || cardCenterX > stageW + 300) continue;
    var dist = cardCenterX - centerX;
    var t = Math.max(-1, Math.min(1, dist / spreadZone));
    var angle = t * maxAngle;
    el.style.setProperty('--arc-angle', angle + 'deg');
  }
}

function renderArcMarks() {
  // 只更新选中标记
  var container = document.getElementById('arcContainer');
  var cards = container.querySelectorAll('.arc-card');
  cards.forEach(function(el) {
    var deckIdx = parseInt(el.dataset.deckIdx);
    var cardIdx = shuffledIndices[deckIdx];
    var card = deckCards[cardIdx];
    var selected = selectedCards.some(function(s) { return s.cardObj.id === card.id; });
    if (selected) el.classList.add('picked');
    else el.classList.remove('picked');
  });
}

// 更新滚动位置（桌面按钮/滚轮）
function scrollTo(px) {
  scrollPx = wrapScroll(px);
  document.getElementById('arcContainer').style.transform = 'translateX(' + (-scrollPx) + 'px)';
  repositionWrappedCards();
  updateCardAngles();
}

// 桌面按钮
document.getElementById('arcNavLeft').addEventListener('click', function() { scrollTo(scrollPx - arcCardWidth * 3); });
document.getElementById('arcNavRight').addEventListener('click', function() { scrollTo(scrollPx + arcCardWidth * 3); });

// 滚轮
document.getElementById('arcStage').addEventListener('wheel', function(e) {
  e.preventDefault();
  scrollTo(scrollPx + e.deltaY * 2);
}, { passive: false });

// ===== 触摸滑动（跟手 + 惯性） =====
(function() {
  var stage = document.getElementById('arcStage');
  var startX = 0, startY = 0, startScroll = 0;
  var movedX = 0, movedY = 0;
  var touching = false, cardTarget = null;
  var velocity = 0, lastX = 0, lastTime = 0;
  var momentumId = null;

  function stopMomentum() {
    if (momentumId) { cancelAnimationFrame(momentumId); momentumId = null; }
  }

  function startMomentum() {
    stopMomentum();
    if (Math.abs(velocity) < 0.3) return;
    var c = cont;
    function step() {
      scrollPx = wrapScroll(scrollPx + velocity);
      velocity *= 0.94;
      c.style.transform = 'translateX(' + (-scrollPx) + 'px)';
      repositionWrappedCards();
      updateCardAngles();
      if (Math.abs(velocity) > 0.1) {
        momentumId = requestAnimationFrame(step);
      }
    }
    momentumId = requestAnimationFrame(step);
  }

  stage.addEventListener('touchstart', function(e) {
    stopMomentum();
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startScroll = scrollPx;
    lastX = startX; lastTime = Date.now();
    movedX = 0; movedY = 0; velocity = 0;
    touching = true;
    cardTarget = e.target.closest('.arc-card');
  }, { passive: false });

  stage.addEventListener('touchmove', function(e) {
    if (!touching) return;
    var curX = e.touches[0].clientX;
    var curY = e.touches[0].clientY;
    movedX = startX - curX;
    movedY = startY - curY;

    e.preventDefault();
    scrollPx = wrapScroll(startScroll + movedX);
    document.getElementById('arcContainer').style.transform = 'translateX(' + (-scrollPx) + 'px)';
    repositionWrappedCards();
    updateCardAngles();

    var now = Date.now();
    var dt = now - lastTime;
    if (dt > 5) {
      velocity = (lastX - curX) / dt * 16;
      lastX = curX; lastTime = now;
    }
    if (Math.abs(movedX) > 8) cardTarget = null;
  }, { passive: false });

  var cont = document.getElementById('arcContainer');

  stage.addEventListener('touchend', function() {
    touching = false;
    scrollPx = wrapScroll(scrollPx);
    cont.style.transform = 'translateX(' + (-scrollPx) + 'px)';
    repositionWrappedCards();
    updateCardAngles();

    if (cardTarget && Math.abs(movedX) < 8 && Math.abs(movedY) < 8) {
      var deckIdx = parseInt(cardTarget.dataset.deckIdx);
      if (!isNaN(deckIdx)) {
        window.__touchHandled = true;
        selectFromArc(deckIdx);
      }
    } else {
      startMomentum();
    }
    cardTarget = null;
  });
})();

// ===== 震动反馈 =====
function vibrate(ms) { if (navigator.vibrate) navigator.vibrate(ms); }
function vibratePattern(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ===== 点击弧牌直接选入槽位（不弹窗、不翻开） =====
function selectFromArc(deckIdx) {
  if (flipped) return; // 已翻牌，不能再选
  if (selectedCards.length >= requiredCount) return;

  var cardIdx = shuffledIndices[deckIdx];
  var card = deckCards[cardIdx];

  // 不重复选
  if (selectedCards.some(function(s) { return s.cardObj.id === card.id; })) return;

  // 找空槽位
  var slotIndex = -1;
  for (var i = 0; i < requiredCount; i++) {
    if (!selectedCards.some(function(s) { return s.slotIndex === i; })) {
      slotIndex = i; break;
    }
  }
  if (slotIndex === -1) return;

  selectedCards.push({
    cardObj: card,
    reversed: Math.random() < 0.5,
    slotIndex: slotIndex
  });

  vibrate(10);
  renderSlots();
  renderArcMarks();
  updateFlipBtn();
}

// ===== 统一翻牌 =====
document.getElementById('flipBtn').addEventListener('click', function() {
  if (selectedCards.length < requiredCount || flipped) return;
  flipped = true;
  vibrate(15);

  // 逐张翻转槽位中的牌
  var slots = document.querySelectorAll('.slot.filled');
  slots.forEach(function(slot, i) {
    setTimeout(function() {
      slot.classList.add('revealed');
      vibrate(8);
    }, i * 600);
  });

  // 翻完后重渲染（显示牌面+名字+逆位），显示 AI 按钮
  var totalDelay = slots.length * 600 + 400;
  setTimeout(function() {
    renderSlots();
    document.getElementById('flipBtn').style.display = 'none';
    var aiBtn = document.getElementById('aiBtn');
    aiBtn.style.display = 'block';
    vibratePattern([15, 40, 20]);
  }, totalDelay);

  updateFlipBtn();
});

// ===== AI 解读 =====
document.getElementById('aiBtn').addEventListener('click', function() {
  selectedCards.sort(function(a, b) { return a.slotIndex - b.slotIndex; });
  var drawn = selectedCards.map(function(s) {
    return {
      cardId: s.cardObj.id, cardName: s.cardObj.name, cardNameEn: s.cardObj.nameEn,
      arcana: s.cardObj.arcana, suit: s.cardObj.suit, element: s.cardObj.element,
      reversed: s.reversed, keywords: s.cardObj.keywords,
      meaning: s.reversed ? s.cardObj.reversed.meaning : s.cardObj.upright.meaning,
      love: s.reversed ? s.cardObj.reversed.love : s.cardObj.upright.love,
      career: s.reversed ? s.cardObj.reversed.career : s.cardObj.upright.career,
      finance: s.reversed ? s.cardObj.reversed.finance : s.cardObj.upright.finance,
      advice: s.reversed ? s.cardObj.reversed.advice : s.cardObj.upright.advice,
      positionIndex: s.slotIndex
    };
  });
  var cardsParam = encodeCardsToURL(drawn);
  window.location.href = 'result.html?spread=' + encodeURIComponent(spreadId) +
    '&question=' + encodeURIComponent(question) +
    '&cards=' + encodeURIComponent(cardsParam);
});

function updateFlipBtn() {
  var btn = document.getElementById('flipBtn');
  var filled = selectedCards.length >= requiredCount;
  btn.disabled = !filled || flipped;
  btn.textContent = flipped ? '正在翻牌...' : (filled ? '翻 牌 ▸' : '还需选 ' + (requiredCount - selectedCards.length) + ' 张');
}

// ===== 键盘（桌面端） =====
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') scrollTo(scrollPx - arcCardWidth * 3);
  if (e.key === 'ArrowRight') scrollTo(scrollPx + arcCardWidth * 3);
});

// 启动
init();
</script>
</body>
</html>
